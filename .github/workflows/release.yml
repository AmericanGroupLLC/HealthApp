name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────────────────────
  # Android: Build release AAB for Play Store
  # ─────────────────────────────────────────────────────────────
  android-release:
    name: Android Release AAB
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Setup Gradle Wrapper
        run: |
          gradle wrapper --gradle-version 8.10 || true
          chmod +x gradlew || true

      - name: Decode keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KS_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KS_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KS_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 -d > upload-keystore.jks
            cat > ../keystore.properties << PROPS
          storeFile=app/upload-keystore.jks
          storePassword=$KS_PASSWORD
          keyAlias=$KS_ALIAS
          keyPassword=$KS_KEY_PASSWORD
          PROPS
            echo "✓ Keystore decoded and keystore.properties created"
          else
            echo "⚠ No ANDROID_KEYSTORE_BASE64 secret — building with debug signing"
          fi

      - name: Build release AAB
        run: ./gradlew :app:bundleRelease

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: android/app/build/outputs/bundle/release/*.aab
          retention-days: 90

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/bundle/release/*.aab
          generate_release_notes: true

  # ─────────────────────────────────────────────────────────────
  # iOS: Build IPA and upload to TestFlight
  # (Skipped automatically if certificate steps fail)
  # ─────────────────────────────────────────────────────────────
  ios-release:
    name: iOS Release (TestFlight)
    runs-on: macos-15
    defaults:
      run:
        working-directory: ios
    steps:
      - uses: actions/checkout@v4

      - name: Check for Apple signing secrets
        id: check-secrets
        env:
          CERT_B64: ${{ secrets.IOS_BUILD_CERTIFICATE_BASE64 }}
        run: |
          if [ -z "$CERT_B64" ]; then
            echo "has_secrets=false" >> $GITHUB_OUTPUT
            echo "⚠ No iOS signing secrets configured — skipping build"
          else
            echo "has_secrets=true" >> $GITHUB_OUTPUT
            echo "✓ iOS signing secrets found"
          fi

      - name: Select Xcode 16
        if: steps.check-secrets.outputs.has_secrets == 'true'
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer || true

      - name: Install xcodegen
        if: steps.check-secrets.outputs.has_secrets == 'true'
        run: brew install xcodegen

      - name: Generate Xcode project
        if: steps.check-secrets.outputs.has_secrets == 'true'
        run: xcodegen generate

      - name: Install Fastlane
        if: steps.check-secrets.outputs.has_secrets == 'true'
        run: |
          gem install bundler
          bundle install

      - name: Install Apple certificate and provisioning profile
        if: steps.check-secrets.outputs.has_secrets == 'true'
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.IOS_BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          echo -n "$PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles

      - name: Build and upload to TestFlight
        if: steps.check-secrets.outputs.has_secrets == 'true'
        env:
          APP_STORE_CONNECT_API_KEY_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_KEY: ${{ secrets.ASC_API_KEY }}
        run: bundle exec fastlane beta

      - name: Upload IPA artifact
        if: always() && steps.check-secrets.outputs.has_secrets == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: release-ipa
          path: ios/build/*.ipa
          retention-days: 90

      - name: Cleanup keychain
        if: always() && steps.check-secrets.outputs.has_secrets == 'true'
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true

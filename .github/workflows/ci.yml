name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read
  checks: write
  pull-requests: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────
  # Backend: Jest unit/integration tests + smoke test
  # ─────────────────────────────────────────────────────────────
  backend:
    name: Backend (Jest + smoke)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - name: Prepare .env
        run: |
          cp .env.example .env
          sed -i "s|JWT_SECRET=.*|JWT_SECRET=ci-secret-12345678901234567890ABCD|" .env
          sed -i "s|DB_PATH=.*|DB_PATH=/tmp/myhealth-ci.db|" .env
      - name: Jest with coverage
        run: npm test -- --coverage --runInBand --detectOpenHandles --forceExit
      - name: Boot server in background
        run: |
          node server.js &
          echo $! > server.pid
          sleep 3
      - name: Smoke test
        run: node smoke.js
      - name: Stop server
        if: always()
        run: kill $(cat server.pid) || true
      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: server/coverage/lcov.info
          flags: backend
          name: backend-coverage-ci
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ─────────────────────────────────────────────────────────────
  # Android: Lint + Unit tests + Assemble
  # ─────────────────────────────────────────────────────────────
  android:
    name: Android (Lint + Unit + Assemble Debug)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-
      - name: Setup Gradle Wrapper
        run: |
          gradle wrapper --gradle-version 8.10 || true
          chmod +x gradlew || true
      - name: Lint
        run: ./gradlew :app:lintDebug --warning-mode all || true
      - name: Unit tests (app)
        run: ./gradlew :app:testDebugUnitTest
      - name: Assemble Debug
        run: ./gradlew :app:assembleDebug
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-unit-test-results
          path: android/app/build/reports/tests/
          retention-days: 14
      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          directory: android
          flags: android
          name: android-unit-coverage
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 14

  # ─────────────────────────────────────────────────────────────
  # Android Emulator: Instrumented / UI tests on emulator
  # ─────────────────────────────────────────────────────────────
  android-emulator:
    name: Android Instrumented UI Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'run-emulator')
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-
      - name: Setup Gradle Wrapper
        run: |
          gradle wrapper --gradle-version 8.10 || true
          chmod +x gradlew || true
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Run instrumented tests (NavigationUITest + OnboardingUITest)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          profile: pixel_6
          heap-size: 512M
          ram-size: 4096M
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          working-directory: android
          script: ./gradlew connectedDebugAndroidTest
      - name: Upload emulator test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-instrumented-test-results
          path: |
            android/app/build/reports/androidTests/
            android/app/build/outputs/androidTest-results/
          retention-days: 14

  # ─────────────────────────────────────────────────────────────
  # iOS: Build + FitFusionCore package tests + UI Tests
  # ─────────────────────────────────────────────────────────────
  ios:
    name: iOS (Build + UI Tests)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Show Xcode version
        run: xcodebuild -version

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer || true

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: ios
        run: xcodegen generate

      # FitFusionCore Swift Package tests
      - name: FitFusionCore tests on iPhone Simulator
        working-directory: shared/FitFusionCore
        run: |
          xcodebuild test \
            -scheme FitFusionCore-Package \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro,OS=latest' \
            CODE_SIGNING_ALLOWED=NO 2>&1 | tail -20 || true

      # Build the iOS app
      - name: Build iOS app (simulator)
        working-directory: ios
        run: |
          xcodebuild build-for-testing \
            -project FitFusion.xcodeproj \
            -scheme FitFusion \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro,OS=latest' \
            CODE_SIGN_IDENTITY=- CODE_SIGNING_ALLOWED=NO 2>&1 | tail -30

      # Run all UI tests (LoginFlow, TabNavigation, CareTabDeep, WorkoutTabDeep + existing)
      - name: Run UI tests on iPhone Simulator
        working-directory: ios
        run: |
          xcodebuild test \
            -project FitFusion.xcodeproj \
            -scheme FitFusion \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro,OS=latest' \
            CODE_SIGN_IDENTITY=- CODE_SIGNING_ALLOWED=NO \
            -only-testing:FitFusionUITests \
            -resultBundlePath TestResults.xcresult 2>&1 | tail -30

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-ui-test-results
          path: ios/TestResults.xcresult
          retention-days: 14

  # ─────────────────────────────────────────────────────────────
  # Marketing site (lint)
  # ─────────────────────────────────────────────────────────────
  marketing:
    name: Marketing site (lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: HTML / CSS lint (best-effort)
        run: |
          npx --yes htmlhint index.html || true
          npx --yes stylelint "styles.css" || true
